version: "1.0"
updated_at: "2026-03-30"
owner: "asset-scan"
description: "Probe catalog for asset exposure and fingerprint signal collection"

policy:
  timezone: "Asia/Shanghai"
  allowed_window: "Mon-Fri 09:00-18:00"
  max_http_rps_per_target: 10
  max_tcp_concurrency_per_target: 100
  max_ws_connect_per_minute_per_target: 3

priority_ports:
  critical: [18789, 18791, 18793]
  high: [11434, 3000, 8080, 9090]
  medium: [8000, 5000, 3001]
  low: [80, 443, 8081]

probes:
  - probe_id: "tcp_connect_priority_ports"
    layer: "L1"
    category: "port"
    enabled: true
    request:
      protocol: "tcp"
      method: "connect"
      ports: [18789, 18791, 18793, 11434, 3000, 8080, 9090, 8000, 5000, 3001, 80, 443]
      timeout_ms: 800
      retry: 1
    expected_signals:
      - "open_port"
    fallback:
      action: "continue"
      note: "Do not stop pipeline on single port timeout"
    risk:
      false_positive_risk: "low"
      scope_note: "Generic exposure signal"

  - probe_id: "http_root_head"
    layer: "L1"
    category: "http"
    enabled: true
    request:
      protocol: "http"
      method: "HEAD"
      path: "/"
      timeout_ms: 1200
      retry: 1
    expected_signals:
      - "status_code"
      - "headers"
    fallback:
      action: "degrade_to_get"
      note: "If HEAD blocked, try GET /"
    risk:
      false_positive_risk: "medium"
      scope_note: "Dependent on reverse proxy behavior"

  - probe_id: "openclaw_gateway_ws_connect"
    layer: "L3"
    category: "websocket"
    target_id: "openclaw-gateway"
    enabled: true
    request:
      protocol: "ws"
      method: "connect_and_send"
      ports: [18789, 18791, 18793]
      path: "/"
      payload: '{"type":"connect"}'
      timeout_ms: 1500
      retry: 1
    expected_signals:
      - "body_contains:type:hello-ok"
      - "body_contains:presence"
    fallback:
      action: "continue"
      note: "Do not classify by ws signal alone"
    risk:
      false_positive_risk: "low"
      scope_note: "Strong positive signal for openclaw gateway"

  - probe_id: "ollama_api_tags"
    layer: "L2"
    category: "http"
    target_id: "ollama"
    enabled: true
    request:
      protocol: "http"
      method: "GET"
      ports: [11434]
      path: "/api/tags"
      timeout_ms: 1200
      retry: 1
    expected_signals:
      - "status_code:200"
      - "json_has:models"
    fallback:
      action: "continue"
      note: "Degrade to generic HTTP probe if JSON parse fails"
    risk:
      false_positive_risk: "low"
      scope_note: "Stable ollama API marker"

  - probe_id: "langflow_flows_api"
    layer: "L2"
    category: "http"
    target_id: "langflow"
    enabled: true
    request:
      protocol: "http"
      method: "GET"
      ports: [3000, 8080, 9090]
      path: "/api/v1/flows"
      timeout_ms: 1200
      retry: 1
    expected_signals:
      - "status_code:200"
      - "json_has:flows"
      - "json_item_has:flow_id"
    fallback:
      action: "continue"
      note: "Only medium confidence when path exists but schema missing"
    risk:
      false_positive_risk: "medium"
      scope_note: "Some custom services may expose similar path"

  - probe_id: "autogpt_status_api"
    layer: "L2"
    category: "http"
    target_id: "autogpt"
    enabled: true
    request:
      protocol: "http"
      method: "GET"
      ports: [8000]
      path: "/api/agent/status"
      timeout_ms: 1200
      retry: 1
    expected_signals:
      - "status_code:200"
      - "json_has:agent_id"
    fallback:
      action: "continue"
      note: "Treat as weak signal if only status=200"
    risk:
      false_positive_risk: "medium"
      scope_note: "Path-like collisions possible in custom APIs"
